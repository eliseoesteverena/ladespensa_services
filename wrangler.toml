name = "ladespensa-servicew"
main = "src/worker.js"
compatibility_date = "2026-02-19"

# ── Base de datos D1 ──────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "ladespensa_db"
database_id = "f124b1d2-21ca-4470-b07e-247745540909"

# ── KV namespace para rate limiting (auth-module) ────────────
[[kv_namespaces]]
binding = "AUTH_RATE_LIMIT_KV"
id = "c49dd492057148859db7e2e7acd6a61b" 

# ── Variables de entorno ──────────────────────────────────────
[vars]
# Auth
JWT_ISSUER = "ladespensa"
JWT_AUDIENCE = "ladespensa-api"
ALLOWED_ORIGINS = "https://ladespensa-frontend.pages.dev" # ← agregar dominio de producción separado por coma
AUTH_BASE_PATH = "" # el prefijo /auth lo maneja src/worker.js
VALID_ROLES = "owner,admin,member,viewer"
MAX_FAILED_ATTEMPTS = "5"
LOCKOUT_MINUTES = "15"
DEFAULT_TENANT_PLAN = "basic"
DEFAULT_TENANT_STATUS = "active"
DEFAULT_MAX_USERS = "10"

# App
GEMINI_MODEL = "gemini-2.5-flash-lite"

# ── Cron trigger: limpieza de sesiones expiradas (auth) ──────
[triggers]
crons = ["0 3 * * *"]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1