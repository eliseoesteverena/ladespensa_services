name               = "casa-stock"
main               = "src/worker.js"
compatibility_date = "2025-01-01"

# ── Base de datos D1 ──────────────────────────────────────────
[[d1_databases]]
binding       = "DB"
database_name = "casa-stock-db"
database_id   = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"   # ← reemplazar tras: wrangler d1 create casa-stock-db

# ── KV namespace para rate limiting (auth-module) ────────────
[[kv_namespaces]]
binding    = "AUTH_RATE_LIMIT_KV"
id         = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"           # ← producción
preview_id = "yyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyy"           # ← desarrollo local

# ── Variables de entorno ──────────────────────────────────────
[vars]
# Auth
JWT_ISSUER            = "casa-stock"
JWT_AUDIENCE          = "casa-stock-api"
ALLOWED_ORIGINS       = "http://localhost:3000"           # ← agregar dominio de producción separado por coma
AUTH_BASE_PATH        = "/auth"                           # rutas auth en /auth/login, /auth/register, etc.
VALID_ROLES           = "owner,admin,member,viewer"
MAX_FAILED_ATTEMPTS   = "5"
LOCKOUT_MINUTES       = "15"
DEFAULT_TENANT_PLAN   = "basic"
DEFAULT_TENANT_STATUS = "active"
DEFAULT_MAX_USERS     = "10"

# App
GEMINI_MODEL          = "gemini-2.5-flash-lite"

# ── Cron trigger: limpieza de sesiones expiradas (auth) ──────
[triggers]
crons = ["0 3 * * *"]

# ── Secrets (configurar con: wrangler secret put <NOMBRE>) ───
# JWT_SECRET       → wrangler secret put JWT_SECRET
# GEMINI_API_KEY   → wrangler secret put GEMINI_API_KEY
